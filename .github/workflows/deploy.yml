name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compute site URL and base path
        id: site
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ "${REPO,,}" = "${OWNER}.github.io" ]; then
            echo "url=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
            echo "base=" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
            echo "base=/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: ${{ steps.site.outputs.url }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.site.outputs.base }}
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
